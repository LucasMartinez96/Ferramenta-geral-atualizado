<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Hacker</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Courier New',monospace;
  background:black;
}

/* MATRIX */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* BOX */
.box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;

  background:rgba(0,0,0,0.8);
  border:1px solid #00ff88;
  padding:35px;
  border-radius:12px;
  width:320px;

  box-shadow:0 0 20px #00ff88;
}

h2{
  color:#00ff88;
  text-align:center;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  background:#001a10;
  color:#00ff88;
}

input::placeholder{
  color:#00ff88aa;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.login{
  background:#00ff88;
  color:black;
}

.cadastro{
  background:#002b1a;
  color:#00ff88;
}

#msg{
  margin-top:10px;
  text-align:center;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="box">

<h2>ACESSO</h2>

<input id="email" placeholder="email">
<input id="senha" type="password" placeholder="senha">

<button class="btn login" id="login">ENTRAR</button>
<button class="btn cadastro" id="cadastro">CRIAR CONTA</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyA88k9VQ3rjNt7OWTVwLYenrA0R4wwtPGs",
  authDomain: "meu-sistema-f83ab.firebaseapp.com",
  projectId: "meu-sistema-f83ab",
  storageBucket: "meu-sistema-f83ab.firebasestorage.app",
  messagingSenderId: "33394533141",
  appId: "1:33394533141:web:785b4b4e0f139589bdbf1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// BASE (github pages)
const base = window.location.pathname.includes("Ferramenta-geral-atualizado")
  ? "/Ferramenta-geral-atualizado/"
  : "/";

// ELEMENTOS
const email = document.getElementById("email");
const senha = document.getElementById("senha");
const msg = document.getElementById("msg");

// LOGIN
document.getElementById("login").onclick = async () => {
  msg.innerText = "Invadindo sistema...";
  msg.style.color = "#00ff88";

  try {
    await signInWithEmailAndPassword(auth, email.value, senha.value);

    msg.innerText = "✅ ACESSO LIBERADO";
    location = base + "index.html";

  } catch(e){
    tratarErro(e);
  }
};

// CADASTRO
document.getElementById("cadastro").onclick = async () => {

  if(!email.value || !senha.value){
    msg.innerText = "Preencha os dados";
    msg.style.color = "orange";
    return;
  }

  try{

    const cred = await createUserWithEmailAndPassword(
      auth, email.value, senha.value
    );

    await setDoc(doc(db,"usuarios",cred.user.uid),{
      email: email.value,
      tipo: "user"
    });

    msg.innerText = "✅ Conta criada! Faça login.";
    msg.style.color = "#00ff88";

  }catch(e){
    tratarErro(e);
  }
};

// ERROS
function tratarErro(e){

  if(e.code === "auth/user-not-found"){
    msg.innerText = "Usuário não encontrado";
  }
  else if(e.code === "auth/wrong-password"){
    msg.innerText = "Senha incorreta";
  }
  else if(e.code === "auth/email-already-in-use"){
    msg.innerText = "Email já cadastrado";
  }
  else{
    msg.innerText = e.message;
  }

  msg.style.color = "#ff4d4d";
}

</script>

<script>
// MATRIX EFFECT
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letras = "01#@$%&*ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const array = letras.split("");

const fontSize = 16;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff88";
  ctx.font = fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    const text = array[Math.floor(Math.random()*array.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
      drops[i]=0;
    }

    drops[i]++;
  }
}

setInterval(draw,35);

// responsivo
window.onresize = () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
};

</script>

</body>
</html>
