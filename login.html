<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login Sistema</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Segoe UI, Arial;
  background:linear-gradient(135deg,#f8fafc,#e2e8f0);
}

/* CARD */
.box{
  background:white;
  padding:40px;
  border-radius:12px;
  width:340px;

  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

/* TITULO */
h2{
  text-align:center;
  color:#1e293b;
  margin-bottom:25px;
}

/* INPUT */
.input-group{
  margin-bottom:15px;
}

label{
  font-size:13px;
  color:#64748b;
}

input{
  width:100%;
  padding:12px;
  margin-top:5px;
  border:1px solid #cbd5f5;
  border-radius:8px;
  font-size:14px;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:#2563eb;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.login{
  background:#2563eb;
  color:white;
  margin-top:10px;
}

.login:hover{
  background:#1d4ed8;
}

.cadastro{
  background:#f1f5f9;
  color:#334155;
  margin-top:8px;
}

.cadastro:hover{
  background:#e2e8f0;
}

/* MSG */
#msg{
  margin-top:15px;
  text-align:center;
  font-size:14px;
}
</style>
</head>

<body>

<div class="box">

<h2>Acesso ao Sistema</h2>

<div class="input-group">
<label>Email</label>
<input id="email" placeholder="seu@email.com">
</div>

<div class="input-group">
<label>Senha</label>
<input id="senha" type="password" placeholder="********">
</div>

<button class="btn login" id="login">Entrar</button>
<button class="btn cadastro" id="cadastro">Criar conta</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyA88k9VQ3rjNt7OWTVwLYenrA0R4wwtPGs",
  authDomain: "meu-sistema-f83ab.firebaseapp.com",
  projectId: "meu-sistema-f83ab",
  storageBucket: "meu-sistema-f83ab.firebasestorage.app",
  messagingSenderId: "33394533141",
  appId: "1:33394533141:web:785b4b4e0f139589bdbf1c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const base = window.location.pathname.includes("Ferramenta-geral-atualizado")
  ? "/Ferramenta-geral-atualizado/"
  : "/";

const email = document.getElementById("email");
const senha = document.getElementById("senha");
const msg = document.getElementById("msg");

// LOGIN
document.getElementById("login").onclick = async () => {
  msg.innerText = "Entrando...";
  msg.style.color = "#2563eb";

  try {
    await signInWithEmailAndPassword(auth, email.value, senha.value);
    msg.innerText = "✅ Login realizado!";
    location = base + "index.html";

  } catch(e) {
    tratarErro(e);
  }
};

// CADASTRO
document.getElementById("cadastro").onclick = async () => {

  if(!email.value || !senha.value){
    msg.innerText = "Preencha todos os campos";
    msg.style.color = "orange";
    return;
  }

  try {

    const cred = await createUserWithEmailAndPassword(
      auth, email.value, senha.value
    );

    await setDoc(doc(db,"usuarios",cred.user.uid), {
      email: email.value,
      tipo: "user"
    });

    msg.innerText = "✅ Conta criada com sucesso!";
    msg.style.color = "green";

  } catch(e) {
    tratarErro(e);
  }
};

// ERROS
function tratarErro(e){

  if(e.code === "auth/user-not-found"){
    msg.innerText = "Usuário não encontrado";
  }
  else if(e.code === "auth/wrong-password"){
    msg.innerText = "Senha incorreta";
  }
  else if(e.code === "auth/email-already-in-use"){
    msg.innerText = "Email já cadastrado";
  }
  else{
    msg.innerText = e.message;
  }

  msg.style.color = "#dc2626";
}

</script>

</body>
</html>
