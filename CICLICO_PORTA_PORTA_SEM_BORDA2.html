<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Inventário Cíclico (printfit LPP21) — LogoFix</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
/* ───────── RESET ───────── */
*, *::before, *::after {
  box-sizing: border-box;
}

/* ───────── BASE ───────── */
body {
  font-family: Arial, Helvetica, sans-serif;
  margin: 16px;
  color: #222;
  background: #f4f7fa;
}

h2 {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 12px;
}

/* ───────── CARDS ───────── */
.card {
  background: #fff;
  border: 1px solid #d1dae3;
  border-radius: 10px;
  padding: 12px;
  margin: 14px 0;
}

/* ───────── LAYOUT ───────── */
.row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-bottom: 8px;
}

/* ───────── INPUTS ───────── */
input, button, select {
  padding: 8px 12px;
  border: 1px solid #c8d2dd;
  border-radius: 6px;
  font-size: 13px;
}

input[type="file"] {
  padding: 6px;
}

button {
  cursor: pointer;
  border: none;
}

/* ───────── BOTÕES ───────── */
.btn-lg {
  min-width: 180px;
  padding: 10px 16px;
  font-weight: 800;
  border-radius: 8px;
  font-size: 13px;
}

.alt {
  background: #e9f6ff;
  border: 2px dashed #1a73e8;
  color: #1a73e8;
}

.primary {
  background: #1a73e8;
  color: #fff;
}

/* ───────── SEGMENTED ───────── */
.segmented {
  display: inline-flex;
  border: 1px solid #c8d2dd;
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
}

.segmented label {
  padding: 8px 10px;
  cursor: pointer;
  font-size: 12px;
}

.segmented input {
  display: none;
}

.segmented input:checked + span {
  background: #1a73e8;
  color: #fff;
}

/* ───────── TEXTO ───────── */
.muted {
  font-size: 12px;
  color: #666;
}

/* ───────── TABELA ───────── */
table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid #d8e1ea;
  padding: 5px 7px;
  font-size: 12px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

th {
  background: #eef3f8;
  font-weight: 700;
  text-align: left;
}

/* ───────── PRINT ───────── */
@media print {
  @page {
    size: A4 landscape;
    margin: 8mm;
  }

  #controles, #resultados, h2 {
    display: none;
  }

  body {
    background: #fff;
  }

  .sheet {
    page-break-inside: avoid;
  }
}
</style>

css/design-system.css
js/normalize-styles.jsscript>
</head>

<body>

<h2>Inventário Cíclico</h2>

<!-- ───────── CONTROLES ───────── -->
<div id="controles" class="card">

  <div class="row">
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
    <span class="muted">Carregue CSV, XLSX ou XLS.</span>
  </div>

  <div class="row">
    <input id="search" placeholder="Código ou descrição">
    <button class="primary" id="btnBuscar">Buscar</button>

    <input id="searchPos" placeholder="Ex: 1-200">

    <div class="segmented">
      <label><input type="radio" name="lado" value="todos" checked><span>Todos</span></label>
      <label><input type="radio" name="lado" value="par"><span>Par</span></label>
      <label><input type="radio" name="lado" value="impar"><span>Ímpar</span></label>
    </div>
  </div>

  <div class="row">
    <button id="btnCiclicoQtd" class="btn-lg alt">Cíclico QTD</button>
    <button id="btnCiclicoSqtd" class="btn-lg primary">Cíclico SQTD</button>
    <button id="btnAmbos" class="btn-lg primary">QTD + SQTD</button>
    <button onclick="window.print()" class="btn-lg primary">🖨️ Imprimir</button>
  </div>
</div>

<!-- ───────── RESULTADO ───────── -->
<div id="resultados" class="card">
  <strong>Prévia</strong>
  <table id="tabela"></table>
</div>

<!-- ───────── PRINT ───────── -->
<div id="printArea" class="card"></div>

<!-- LIBS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.20.2/xlsx.full.min.js"></script>

<script>
'use strict';

let dados = [];
let ultimoFiltro = [];

/* ───────── BUSCA ───────── */
function montarTabela() {
  const termo = document.getElementById('search').value.toLowerCase();

  ultimoFiltro = dados.filter(l =>
    (l.Pieza || '').toLowerCase() === termo ||
    (l.Descripcion1 || '').toLowerCase().includes(termo)
  );

  const tabela = document.getElementById('tabela');
  tabela.innerHTML = '';

  if (!ultimoFiltro.length) {
    tabela.innerHTML = '<tr><td>Nada encontrado</td></tr>';
    return;
  }

  const header = tabela.insertRow();
  ['Endereço','Código','Descrição'].forEach(txt => {
    const th = document.createElement('th');
    th.textContent = txt;
    header.appendChild(th);
  });

  ultimoFiltro.forEach(l => {
    const tr = tabela.insertRow();
    tr.insertCell().textContent = l.Ubicacion;
    tr.insertCell().textContent = l.Pieza;
    tr.insertCell().textContent = l.Descripcion1;
  });
}

/* ───────── UPLOAD ───────── */
document.getElementById('fileInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const nome = file.name.toLowerCase();

  if (nome.endsWith('.csv')) {
    Papa.parse(file, {
      header: true,
      complete: res => {
        dados = res.data;
        alert('CSV carregado');
      }
    });
  } else {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    dados = XLSX.utils.sheet_to_json(sheet);
    alert('Excel carregado');
  }
});

/* ───────── EVENTOS ───────── */
document.getElementById('btnBuscar').addEventListener('click', montarTabela);
</script>

</body>
</html>
