<!DOCTYPE html>
 <html lang="pt-BR">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Painel Diário de Devoluções</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<link rel="stylesheet" href="css/design-system.css" />

<style>
 :root{
 --bg:#f8fafc;
 --card:#ffffff;
 --chart:#ffffff;
 --text:#1e293b;
 --muted:#64748b;
 --line:#e2e8f0;
 --primary:#2563eb;
 --primary-dark:#1e40af;
 }
 *{box-sizing:border-box;margin:0;padding:0}
 body{
 background:linear-gradient(180deg,#f8fafc 0%,#eef4ff 100%);
 color:var(--text);
 font-family:Inter,Roboto,Segoe UI,Arial,sans-serif;
 min-height:100vh;
 }
 .wrap{max-width:1200px;margin:18px auto;padding:0 16px}
 .card{
 background:var(--card);
 padding:24px;
 border:1px solid var(--line);
 border-radius:16px;
 box-shadow:0 18px 45px rgba(15,23,42,.08);
 }
 .header{
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:14px;
 margin-bottom:20px;
 }
 .header h2{font-size:22px;font-weight:800;color:#0f172a}
 .clock{font-size:14px;color:#475569;font-variant-numeric:tabular-nums}
 .controls{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
 input[type=file],button{
 padding:10px 14px;
 border-radius:10px;
 border:1px solid var(--line);
 background:#fff;
 color:var(--text);
 font-size:13px;
 box-shadow:0 1px 2px rgba(15,23,42,.05);
 }
 input[type=file]{background:#f8fafc;max-width:100%}
 button{cursor:pointer;transition:background .2s,transform .2s,box-shadow .2s}
 .btn-clear{background:#dc2626;border-color:#dc2626;color:#fff;font-weight:700}
 .btn-clear:hover{background:#b91c1c;transform:translateY(-1px);box-shadow:0 8px 18px rgba(220,38,38,.22)}
 .kpis{
 display:grid;
 grid-template-columns:repeat(5,1fr);
 gap:12px;
 margin:16px 0;
 }
 @media(max-width:900px){.kpis{grid-template-columns:repeat(3,1fr)}}
 @media(max-width:700px){.kpis{grid-template-columns:repeat(2,1fr)}.header{align-items:flex-start;flex-direction:column}}
 @media(max-width:480px){.kpis{grid-template-columns:1fr}.card{padding:16px}.wrap{padding:0 10px}}
 .kpi{
 background:linear-gradient(180deg,#ffffff 0%,#f8fbff 100%);
 padding:14px;
 border:1px solid var(--line);
 border-radius:14px;
 box-shadow:0 10px 24px rgba(15,23,42,.06);
 }
 .kpi .label{font-size:11px;color:#64748b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;font-weight:700}
 .kpi .value{font-size:24px;font-weight:900;color:#0f172a;line-height:1.1;font-variant-numeric:tabular-nums}
 .pills{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
 .pill{
 background:#eff6ff;
 padding:8px 13px;
 border-radius:999px;
 font-size:12px;
 border:1px solid #bfdbfe;
 color:#1e3a8a;
 font-weight:800;
 box-shadow:0 1px 2px rgba(37,99,235,.08);
 }
 .chart-box{height:250px;margin-top:10px;position:relative;border:1px solid var(--line);border-radius:16px;background:var(--chart);padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.9)}
 .chart-box canvas{
 width:100%!important;
 height:100%!important;
 background:var(--chart);
 border-radius:12px;
 }
 .sub{margin-top:16px;font-weight:800;color:#334155;font-size:14px}
 .footer{text-align:center;margin-top:40px;color:#64748b;font-size:14px}
 </style>
<script src="js/normalize-styles.js" defer></script>
 </head>

<body>
 <div class="wrap">
 <div class="card">

<div class="header">
 <h2>Painel Diário de Devoluções</h2>
 <div class="clock" id="clock"></div>
 </div>

<div class="controls">
 <input type="file" id="fileInput" accept=".xlsx,.xls">
 <button class="btn-clear" id="btnClear">Limpar Dados</button>
 </div>

<div class="kpis">
 <div class="kpi"><div class="label">Total Embalagens</div><div class="value" id="kEmb">0</div></div>
 <div class="kpi"><div class="label">Total Peças</div><div class="value" id="kPec">0</div></div>
 <div class="kpi"><div class="label">Maior Dia</div><div class="value" id="kMaior">-</div></div>
 <div class="kpi"><div class="label">Média Diária</div><div class="value" id="kMedia">0</div></div>
 <div class="kpi"><div class="label">Dias</div><div class="value" id="kDias">0</div></div>
 </div>

<div class="pills">
 <span class="pill" id="totFab1">Fábrica 1 (MO1) • -</span>
 <span class="pill" id="totFab3">Fábrica 3 (MO3) • -</span>
 </div>

<div class="chart-box">
 <canvas id="graficoPrincipal"></canvas>
 </div>

<div class="sub">Detalhe do dia selecionado</div>

<div class="pills">
 <span class="pill" id="dDia">Dia: -</span>
 <span class="pill" id="dEmb">Embalagens: -</span>
 <span class="pill" id="dPec">Peças: -</span>
 </div>

<div class="chart-box">
 <canvas id="graficoDia"></canvas>
 </div>

</div>
 </div>

<div class="footer">Desenvolvido por <b>Lucas Martinez</b></div>

<script>
 Chart.register(ChartDataLabels);

/* ── estado ── */
 let dataMap = {}, sortedLabels = [], g1 = null, g2 = null;

/* ── relógio ── */
 function atualizarRelogio(){
 const n = new Date();
 document.getElementById('clock').innerText =
 n.toLocaleTimeString('pt-BR') + ' – ' + n.toLocaleDateString('pt-BR');
 }
 setInterval(atualizarRelogio, 1000);
 atualizarRelogio();

/* ── leitura do arquivo ── */
 document.getElementById('fileInput').onchange = function(e){
 const file = e.target.files[0];
 if(!file) return;
 const r = new FileReader();
 r.onload = function(x){
 const wb = XLSX.read(x.target.result, {type:'binary'});
 const sh = wb.Sheets[wb.SheetNames[0]];
 process(XLSX.utils.sheet_to_json(sh, {raw:true}));
 };
 r.readAsBinaryString(file);
 };

document.getElementById('btnClear').onclick = () => location.reload();

/* ── formata data serial do Excel ou string ── */
 function fmt(v){
 if(typeof v === 'number'){
 const d = XLSX.SSF.parse_date_code(v);
 return String(d.d).padStart(2,'0') + '/' +
 String(d.m).padStart(2,'0') + '/' + d.y;
 }
 /* string: aceita dd/mm/yyyy, yyyy-mm-dd, dd-mm-yyyy */
 const s = String(v).trim();
 /* já no formato dd/mm/yyyy */
 if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
 /* yyyy-mm-dd */
 const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
 if(iso) return iso[3]+'/'+iso[2]+'/'+iso[1];
 /* fallback: pega só a primeira parte */
 return s.split(' ')[0];
 }

/* ── processa linhas do XLSX ── */
 function process(rows){
 dataMap = {};
 rows.forEach(function(r){
 if(!r['Data Inserção'] && !r['Data Insercao']) return;
 const raw = r['Data Inserção'] || r['Data Insercao'];
 const d = fmt(raw);
 if(!d) return;

 const q = Number(r['Qtde']) || 0;
 const z = String(r['Zona de origem'] || '').trim();

 if(!dataMap[d]) dataMap[d] = {emb:0, pec:0, f1:{e:0,p:0}, f3:{e:0,p:0}};
 dataMap[d].emb++;
 dataMap[d].pec += q;

 if(z === 'MO1'){ dataMap[d].f1.e++; dataMap[d].f1.p += q; }
 if(z === 'MO3'){ dataMap[d].f3.e++; dataMap[d].f3.p += q; }
 });

render();
 }

/* ── ordenação dd/mm/yyyy ── */
 function sortDates(labels){
 return labels.slice().sort(function(a,b){
 const [da,ma,ya] = a.split('/').map(Number);
 const [db,mb,yb] = b.split('/').map(Number);
 return new Date(ya,ma-1,da) - new Date(yb,mb-1,db);
 });
 }

/* ── render gráfico principal ── */
 function render(){
 sortedLabels = sortDates(Object.keys(dataMap));
 if(!sortedLabels.length) return;

let te=0, tp=0, md='-', mx=0, f1e=0, f1p=0, f3e=0, f3p=0;
 sortedLabels.forEach(function(d){
 const o = dataMap[d];
 te += o.emb; tp += o.pec;
 f1e += o.f1.e; f1p += o.f1.p;
 f3e += o.f3.e; f3p += o.f3.p;
 if(o.emb > mx){ mx = o.emb; md = d; }
 });

document.getElementById('kEmb').innerText = te;
 document.getElementById('kPec').innerText = tp;
 document.getElementById('kMaior').innerText = md;
 document.getElementById('kMedia').innerText = (te/sortedLabels.length).toFixed(1);
 document.getElementById('kDias').innerText = sortedLabels.length;
 document.getElementById('totFab1').innerText = 'Fábrica 1 (MO1) • Emb: '+f1e+' • Peças: '+f1p;
 document.getElementById('totFab3').innerText = 'Fábrica 3 (MO3) • Emb: '+f3e+' • Peças: '+f3p;

/* max dinâmico — nunca corta dados */
 const maxEmb = Math.max(...sortedLabels.map(d=>dataMap[d].emb));
 const yMax = Math.ceil(maxEmb * 1.2 / 10) * 10 || 10;
 const maxPec = Math.max(...sortedLabels.map(d=>dataMap[d].pec));
 const y1Max = Math.ceil(maxPec * 1.2 / 10) * 10 || 10;

if(g1) g1.destroy();
 g1 = new Chart(document.getElementById('graficoPrincipal'), {
 data:{
 labels: sortedLabels,
 datasets:[
 {
 type:'bar', label:'Embalagens',
 data: sortedLabels.map(d=>dataMap[d].emb),
 backgroundColor:'#2563eb', yAxisID:'y', order:1,
 datalabels:{color:'#fff',anchor:'center',align:'center',font:{weight:'bold'}}
 },
 {
 type:'line', label:'Peças',
 data: sortedLabels.map(d=>dataMap[d].pec),
 borderColor:'#16a34a', backgroundColor:'transparent',
 pointBackgroundColor:'#16a34a',
 yAxisID:'y1', order:0,
 datalabels:{color:'#16a34a',anchor:'end',align:'top',offset:6,font:{size:11}}
 }
 ]
 },
 options:{
 maintainAspectRatio:false,
 plugins:{legend:{labels:{color:'#1e293b'}}},
 scales:{
 x:{ticks:{color:'#334155',maxRotation:45,minRotation:45},grid:{color:'#e2e8f0'}},
 y:{beginAtZero:true, max:yMax, ticks:{color:'#334155'}, grid:{color:'#e2e8f0'}},
 y1:{beginAtZero:true, max:y1Max, position:'right',
 ticks:{color:'#16a34a'}, grid:{drawOnChartArea:false}}
 },
 /* ── CHECK-OUT: Chart.js v4 → (event, elements) ── */
 onClick: function(event, elements){
 if(elements && elements.length > 0){
 det(sortedLabels[elements[0].index]);
 }
 }
 }
 });
 }

/* ── detalhe do dia (check-out) ── */
 function det(d){
 const o = dataMap[d];
 if(!o) return;

document.getElementById('dDia').innerText = 'Dia: ' + d;
 document.getElementById('dEmb').innerText = 'Embalagens: ' + o.emb;
 document.getElementById('dPec').innerText = 'Peças: ' + o.pec;

const maxE = Math.max(o.f1.e, o.f3.e);
 const yMax = Math.ceil(maxE * 1.3 / 5) * 5 || 5;
 const maxP = Math.max(o.f1.p, o.f3.p);
 const y1Max = Math.ceil(maxP * 1.3 / 5) * 5 || 5;

if(g2) g2.destroy();
 g2 = new Chart(document.getElementById('graficoDia'), {
 data:{
 labels:['Fábrica 1','Fábrica 3'],
 datasets:[
 {
 type:'bar', label:'Embalagens',
 data:[o.f1.e, o.f3.e],
 backgroundColor:'#2563eb', yAxisID:'y',
 datalabels:{color:'#fff',anchor:'center',align:'center',font:{weight:'bold'}}
 },
 {
 type:'line', label:'Peças',
 data:[o.f1.p, o.f3.p],
 borderColor:'#16a34a', backgroundColor:'transparent',
 pointBackgroundColor:'#16a34a',
 yAxisID:'y1',
 datalabels:{color:'#16a34a',anchor:'end',align:'top',offset:6,font:{size:11}}
 }
 ]
 },
 options:{
 maintainAspectRatio:false,
 plugins:{legend:{labels:{color:'#1e293b'}}},
 scales:{
 x:{ticks:{color:'#334155'},grid:{color:'#e2e8f0'}},
 y:{beginAtZero:true, max:yMax, ticks:{color:'#334155'}, grid:{color:'#e2e8f0'}},
 y1:{beginAtZero:true, max:y1Max, position:'right',
 ticks:{color:'#16a34a'}, grid:{drawOnChartArea:false}}
 }
 }
 });
 }
 </script>
 </body>
 </html>
